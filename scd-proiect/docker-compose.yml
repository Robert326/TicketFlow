version: '3.8'

networks:
  public_net:
    driver: overlay
    attachable: true
  app_net:
    driver: overlay
    attachable: true
  data_net:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  redis_data:
  keycloak_data:
  rabbitmq_data:

services:
  # 1. API Gateway & Frontend (The Entry Point)
  gateway:
    build: ./api-gateway
    image: ticketflow-gateway:latest
    ports:
      - "8001:8000"
    networks:
      - public_net
      - app_net
      - data_net 
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/ticketflow
      - REDIS_URL=redis://redis:6379/0
      - KEYCLOAK_URL=http://auth-service:8080
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager] 
    depends_on:
      - db
      - redis
      - rabbitmq

  # 2. Identity Provider (Keycloak)
  auth-service:
    image: quay.io/keycloak/keycloak:22.0.0
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8080:8080"
    networks:
      - public_net
      - app_net
    volumes:
      - keycloak_data:/opt/keycloak/data
    deploy:
      replicas: 1

  # 3. Database (PostgreSQL)
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ticketflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_net
    deploy:
      replicas: 1

  # 4. In-Memory Store (Redis - for distributed locks)
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - data_net
    deploy:
      replicas: 1

  # 5. Message Broker (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app_net
      - data_net
    deploy:
      replicas: 1

  # 6. PDF Processor Workers (Scalable)
  worker:
    build: ./worker-service
    image: ticketflow-worker:latest
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - DATABASE_URL=postgresql://user:password@db:5432/ticketflow
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
    networks:
      - app_net
      - data_net
    deploy:
      replicas: 3  # Minimum 3 workers as per requirements
      restart_policy:
        condition: on-failure
    depends_on:
      - rabbitmq
      - db
      - mailhog

  # 7. Email Testing Service (SMTP Mock)
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - app_net
    deploy:
      replicas: 1
